<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="100" r="300" fill="url(#orb1)"/>
  <circle cx="200" cy="500" r="250" fill="url(#orb1)" opacity="0.5"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.8" fill="rgba(148,163,184,0.1)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Accent line -->
  <rect x="80" y="200" width="60" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Name -->
  <text x="80" y="260" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-1">Hijrah Assalam</text>
  <!-- Full name -->
  <text x="80" y="300" font-family="JetBrains Mono, monospace" font-size="16" fill="#64748b">Nur Hijrah As Salam Al Ihsan</text>
  <!-- Title -->
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#94a3b8">Full-Stack Engineer &amp; Applied AI Researcher</text>
  <!-- Stats -->
  <rect x="80" y="400" width="180" height="70" rx="12" fill="rgba(15,23,42,0.6)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <text x="170" y="432" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#38bdf8" text-anchor="middle">3,500+</text>
  <text x="170" y="458" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Organizational Users</text>
  <rect x="280" y="400" width="180" height="70" rx="12" fill="rgba(15,23,42,0.6)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <text x="370" y="432" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#38bdf8" text-anchor="middle">4M+</text>
  <text x="370" y="458" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Cumulative App Users</text>
  <rect x="480" y="400" width="180" height="70" rx="12" fill="rgba(15,23,42,0.6)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <text x="570" y="432" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#38bdf8" text-anchor="middle">95.27%</text>
  <text x="570" y="458" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">COVID CXR Accuracy</text>
  <!-- Tech stack -->
  <text x="80" y="530" font-family="JetBrains Mono, monospace" font-size="13" fill="#475569">Laravel · Vue.js · Docker · CI/CD · TensorFlow</text>
  <!-- URL -->
  <text x="80" y="580" font-family="JetBrains Mono, monospace" font-size="14" fill="#38bdf8">hijrahassalam.com</text>
</svg>
